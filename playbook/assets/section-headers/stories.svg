<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="dot-grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#EFE7D8" />
    </pattern>
  </defs>
  
  <rect width="100%" height="100%" fill="#F8F5EE" />
  <rect width="100%" height="100%" fill="url(#dot-grid)" />
  
  <rect x="24" y="24" width="1152" height="312" rx="16" fill="#111827" />
  <rect x="18" y="18" width="1152" height="312" rx="16" fill="#F8F5EE" stroke="#111827" stroke-width="3" />
  <rect x="30" y="30" width="1128" height="288" rx="12" stroke="#EFE7D8" stroke-width="1.5" stroke-dasharray="6 4" fill="none" />
  
  <g transform="translate(1000, 174)">
    
        <!-- Quote book/journal -->
        <rect x="-35" y="-45" width="70" height="90" rx="6" fill="#7C3AED" fill-opacity="0.1" stroke="#7C3AED" stroke-width="3" />
        <line x1="-20" y1="-20" x2="20" y2="-20" stroke="#7C3AED" stroke-width="3" stroke-linecap="round" />
        <line x1="-20" y1="0" x2="10" y2="0" stroke="#7C3AED" stroke-width="3" stroke-linecap="round" />
        <line x1="-20" y1="20" x2="5" y2="20" stroke="#7C3AED" stroke-width="3" stroke-linecap="round" />
        
  </g>
  
  <g transform="translate(80, 85)">
    <text x="0" y="0" font-family="'JetBrains Mono', monospace" font-size="13" font-weight="700" fill="#4B5563" letter-spacing="1.5">PLAYBOOK SECTION</text>
    <text x="0" y="55" font-family="Inter, system-ui, sans-serif" font-size="44" font-weight="900" fill="#111827">Stories</text>
    <text x="0" y="105" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="500" fill="#4B5563">Short, honest accounts of real project execution.</text>
    
    <g transform="translate(0, 155)">
      <rect x="0" y="0" width="140" height="32" rx="16" fill="#EFE7D8" stroke="#111827" stroke-width="1.5" />
      <text x="70" y="20" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#111827" text-anchor="middle">Case Studies</text>
      
      <rect x="155" y="0" width="140" height="32" rx="16" fill="#EFE7D8" stroke="#111827" stroke-width="1.5" />
      <text x="225" y="20" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#111827" text-anchor="middle">Delegate Team</text>
      
      <rect x="310" y="0" width="140" height="32" rx="16" fill="#EFE7D8" stroke="#111827" stroke-width="1.5" />
      <text x="380" y="20" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#111827" text-anchor="middle">Lessons Learnt</text>
    </g>
