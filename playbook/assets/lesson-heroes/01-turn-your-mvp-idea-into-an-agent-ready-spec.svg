<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="dot-grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#EFE7D8" />
    </pattern>
  </defs>
  
  <rect width="100%" height="100%" fill="#F8F5EE" />
  <rect width="100%" height="100%" fill="url(#dot-grid)" />
  
  <rect x="24" y="24" width="1152" height="372" rx="16" fill="#111827" />
  <rect x="18" y="18" width="1152" height="372" rx="16" fill="#F8F5EE" stroke="#111827" stroke-width="3" />
  <rect x="30" y="30" width="1128" height="348" rx="12" stroke="#EFE7D8" stroke-width="1.5" stroke-dasharray="6 4" fill="none" />
  
  <!-- Giant Background Lesson Number -->
  <text x="1100" y="330" font-family="Inter, system-ui, sans-serif" font-size="280" font-weight="900" fill="#EFE7D8" fill-opacity="0.6" text-anchor="end">01</text>
  
  <g transform="translate(80, 85)">
    <text x="0" y="0" font-family="'JetBrains Mono', monospace" font-size="13" font-weight="700" fill="#7C3AED" letter-spacing="1.5">LESSON 01 · GETTING STARTED</text>
    
    <!-- Title wrap protection -->
    <text x="0" y="60" font-family="Inter, system-ui, sans-serif" font-size="44" font-weight="900" fill="#111827">From MVP Idea to Agent-Ready Spec</text>
    
    <!-- Promise -->
    <text x="0" y="115" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="500" fill="#4B5563" width="700">Don’t ask the agent to build before you teach it what problem is worth solving.</text>
    
    <g transform="translate(0, 180)">
      <text x="0" y="0" font-family="'JetBrains Mono', monospace" font-size="12" font-weight="700" fill="#4B5563" letter-spacing="1">SIGNALS ACTIVE IN LESSON:</text>
      <g transform="translate(0, 15)">
        
        <g transform="translate(0, 0)">
          <rect x="0" y="0" width="157" height="32" rx="16" fill="#111827" />
          <rect x="1" y="1" width="155" height="30" rx="15" stroke="#D97706" stroke-width="2" />
          <text x="78.5" y="20" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#D97706" text-anchor="middle" letter-spacing="0.5">DO THIS FIRST</text>
        </g>
        
        <g transform="translate(172, 0)">
          <rect x="0" y="0" width="148" height="32" rx="16" fill="#111827" />
          <rect x="1" y="1" width="146" height="30" rx="15" stroke="#7C3AED" stroke-width="2" />
          <text x="74.0" y="20" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#7C3AED" text-anchor="middle" letter-spacing="0.5">MENTAL MODEL</text>
        </g>
        
        <g transform="translate(335, 0)">
          <rect x="0" y="0" width="156" height="32" rx="16" fill="#111827" />
          <rect x="1" y="1" width="154" height="30" rx="15" stroke="#2563EB" stroke-width="2" />
          <text x="78.0" y="20" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#2563EB" text-anchor="middle" letter-spacing="0.5">AGENT MOVE</text>
        </g>
        
        <g transform="translate(506, 0)">
          <rect x="0" y="0" width="150" height="32" rx="16" fill="#111827" />
          <rect x="1" y="1" width="148" height="30" rx="15" stroke="#DC2626" stroke-width="2" />
          <text x="75.0" y="20" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#DC2626" text-anchor="middle" letter-spacing="0.5">DON'T BREAK</text>
        </g>
        
      </g>
