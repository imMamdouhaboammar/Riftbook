<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 88" width="280" height="88" role="img" aria-label="Explore Skills">
  <defs>
    <style>
      .card-title { font-family: 'Georgia','Times New Roman',serif; font-weight:700; font-size:14px; fill:#111827; }
      .card-sub   { font-family: 'Courier New','Courier',monospace; font-size:9px; fill:#4B5563; letter-spacing:0.12em; font-weight:700; }
      .card-desc  { font-family: 'Georgia','Times New Roman',serif; font-size:10px; fill:#4B5563; font-style:italic; }
    </style>
  </defs>
  <!-- Card shell -->
  <rect width="280" height="88" rx="6" fill="#F8F5EE" stroke="#111827" stroke-width="1.5"/>
  <!-- Left accent bar -->
  <rect x="0" y="0" width="5" height="88" rx="3" fill="#16A34A"/>
  <!-- Skills icon: layered cards / stacked files motif -->
  <rect x="12" y="28" width="30" height="40" rx="3" fill="none" stroke="#16A34A" stroke-width="1.5"/>
  <rect x="17" y="22" width="30" height="40" rx="3" fill="#F8F5EE" stroke="#4B5563" stroke-width="1" stroke-dasharray="2 2"/>
  <rect x="22" y="16" width="30" height="40" rx="3" fill="#EFE7D8" stroke="#111827" stroke-width="1.5"/>
  <!-- Lines on top card -->
  <line x1="28" y1="26" x2="46" y2="26" stroke="#4B5563" stroke-width="0.7"/>
  <line x1="28" y1="32" x2="46" y2="32" stroke="#4B5563" stroke-width="0.7"/>
  <line x1="28" y1="38" x2="40" y2="38" stroke="#16A34A" stroke-width="1.2"/>
  <circle cx="46" cy="38" r="3" fill="#16A34A"/>
  <!-- Text -->
  <text x="66" y="35" class="card-sub">EXPLORE</text>
  <text x="66" y="52" class="card-title">Skills</text>
  <text x="66" y="66" class="card-desc">Reusable agent behaviors</text>
  <text x="66" y="78" class="card-desc">Custom prompt logic layers</text>
</svg>
