<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 88" width="280" height="88" role="img" aria-label="Browse Tools">
  <defs>
    <style>
      .card-title { font-family: 'Georgia','Times New Roman',serif; font-weight:700; font-size:14px; fill:#111827; }
      .card-sub   { font-family: 'Courier New','Courier',monospace; font-size:9px; fill:#4B5563; letter-spacing:0.12em; font-weight:700; }
      .card-desc  { font-family: 'Georgia','Times New Roman',serif; font-size:10px; fill:#4B5563; font-style:italic; }
    </style>
  </defs>
  <!-- Card shell -->
  <rect width="280" height="88" rx="6" fill="#F8F5EE" stroke="#111827" stroke-width="1.5"/>
  <!-- Left accent bar -->
  <rect x="0" y="0" width="5" height="88" rx="3" fill="#D97706"/>
  <!-- Tool icon (wrench/gear symbol built from primitives) -->
  <!-- Gear outer ring -->
  <circle cx="32" cy="44" r="16" fill="none" stroke="#D97706" stroke-width="1.5"/>
  <circle cx="32" cy="44" r="8" fill="none" stroke="#D97706" stroke-width="1.5"/>
  <!-- Gear teeth: 8 small lines -->
  <line x1="32" y1="26" x2="32" y2="22" stroke="#D97706" stroke-width="2" stroke-linecap="round"/>
  <line x1="32" y1="62" x2="32" y2="66" stroke="#D97706" stroke-width="2" stroke-linecap="round"/>
  <line x1="14" y1="44" x2="10" y2="44" stroke="#D97706" stroke-width="2" stroke-linecap="round"/>
  <line x1="50" y1="44" x2="54" y2="44" stroke="#D97706" stroke-width="2" stroke-linecap="round"/>
  <line x1="19.3" y1="31.3" x2="16.4" y2="28.4" stroke="#D97706" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="44.7" y1="56.7" x2="47.6" y2="59.6" stroke="#D97706" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="44.7" y1="31.3" x2="47.6" y2="28.4" stroke="#D97706" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="19.3" y1="56.7" x2="16.4" y2="59.6" stroke="#D97706" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Text -->
  <text x="62" y="35" class="card-sub">BROWSE</text>
  <text x="62" y="52" class="card-title">Tools</text>
  <text x="62" y="66" class="card-desc">IDE extensions · MCP servers</text>
  <text x="62" y="78" class="card-desc">CLI utilities · Agent tools</text>
</svg>
