<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 88" width="280" height="88" role="img" aria-label="Start the Playbook">
  <defs>
    <style>
      .card-title { font-family: 'Georgia','Times New Roman',serif; font-weight:700; font-size:14px; fill:#111827; }
      .card-sub   { font-family: 'Courier New','Courier',monospace; font-size:9px; fill:#4B5563; letter-spacing:0.12em; font-weight:700; }
      .card-desc  { font-family: 'Georgia','Times New Roman',serif; font-size:10px; fill:#4B5563; font-style:italic; }
    </style>
  </defs>
  <!-- Card shell -->
  <rect width="280" height="88" rx="6" fill="#F8F5EE" stroke="#111827" stroke-width="1.5"/>
  <!-- Left accent bar -->
  <rect x="0" y="0" width="5" height="88" rx="3" fill="#2563EB"/>
  <!-- Icon area -->
  <rect x="14" y="18" width="36" height="52" rx="4" fill="none" stroke="#2563EB" stroke-width="1.5"/>
  <line x1="32" y1="18" x2="32" y2="70" stroke="#2563EB" stroke-width="0.7"/>
  <line x1="17" y1="30" x2="29" y2="30" stroke="#4B5563" stroke-width="0.6"/>
  <line x1="17" y1="37" x2="29" y2="37" stroke="#4B5563" stroke-width="0.6"/>
  <line x1="35" y1="30" x2="47" y2="30" stroke="#4B5563" stroke-width="0.6"/>
  <circle cx="32" cy="55" r="4" fill="#2563EB" stroke="#111827" stroke-width="1"/>
  <!-- Text -->
  <text x="62" y="35" class="card-sub">START HERE</text>
  <text x="62" y="52" class="card-title">The Playbook</text>
  <text x="62" y="66" class="card-desc">Real workflows · real lessons</text>
  <text x="62" y="78" class="card-desc">Mistakes · Paths by role</text>
