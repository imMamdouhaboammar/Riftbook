<svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer Box (Tickbox style) -->
  <rect x="2" y="2" width="16" height="16" rx="4" fill="#0B0F19" stroke="#374151" stroke-width="1.5"/>
  <rect x="2" y="2" width="16" height="16" rx="4" stroke="url(#box-grad)" stroke-width="1.5" stroke-opacity="0.8"/>
  
  <!-- Eye Shape -->
  <path d="M5 10c1.2-2 3.2-3 5-3s3.8 1 5 3c-1.2 2-3.2 3-5 3s-3.8-1-5-3z" stroke="url(#eye-grad)" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Iris -->
  <circle cx="10" cy="10" r="1.8" fill="#3B82F6"/>
  <!-- Pupil -->
  <circle cx="10" cy="10" r="0.8" fill="#F9FAFB"/>
  
  <!-- Definitions for gradients -->
  <defs>
    <linearGradient id="box-grad" x1="2" y1="2" x2="18" y2="18" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="eye-grad" x1="5" y1="7" x2="15" y2="13" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F3F4F6"/>
      <stop offset="100%" stop-color="#9CA3AF"/>
    </linearGradient>
  </defs>
</svg>
