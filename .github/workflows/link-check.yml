name: Link Check

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "**/*.md"

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: "--verbose --no-progress './**/*.md'"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
